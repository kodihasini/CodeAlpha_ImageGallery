<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<div class="filters">

    <button class="active" onclick="filterImages('all', this)">All</button>

    <button onclick="filterImages('travel', this)">Travel</button>

    <button onclick="filterImages('city', this)">City</button>

    <button onclick="filterImages('food', this)">Food</button>

    <button onclick="filterImages('animals', this)">Animals</button>

</div>


<div class="gallery">

    <div class="image travel">
        <img src="images/img1.png" onclick="openLightbox(0)">
    </div>

    <div class="image city">
        <img src="images/img3.png" onclick="openLightbox(2)">
    </div>

    <div class="image food">
        <img src="images/img5.png" onclick="openLightbox(4)">
    </div>

    <div class="image animals">
        <img src="images/img7.png" onclick="openLightbox(6)">
    </div>

    <div class="image travel">
        <img src="images/img2.png" onclick="openLightbox(1)">
    </div>

    <div class="image city">
        <img src="images/img4.png" onclick="openLightbox(3)">
    </div>

    <div class="image food">
        <img src="images/img6.png" onclick="openLightbox(5)">
    </div>

    <div class="image animals">
        <img src="images/img8.png" onclick="openLightbox(7)">
    </div>

</div>


<div id="lightbox">

    <span class="close" onclick="closeLightbox()">×</span>

    <button class="prev" onclick="changeImage(-1)">❮</button>

    <img id="lightbox-img">

    <button class="next" onclick="changeImage(1)">❯</button>

</div>

<script src="script.js"></script>

</body>
</html>
